name: Deploy Bartera to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: bartera-app
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

      - name: Prepare standalone package
        run: |
          cp server.js .next/standalone/
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public 2>/dev/null || true
          # Copy prisma engine so it works in production
          mkdir -p .next/standalone/node_modules/.prisma
          cp -r node_modules/.prisma/client .next/standalone/node_modules/.prisma/client
          mkdir -p .next/standalone/node_modules/@prisma
          cp -r node_modules/@prisma/client .next/standalone/node_modules/@prisma/client
          cp -r prisma .next/standalone/prisma

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .next/standalone

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_382A2969646549F098EBA698F000ABB6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A9E84F3890BD4961A436B6682FE8C5CC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_73099B22D65146A9BBE1512D58945CD9 }}

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .
          startup-command: 'node server.js'
