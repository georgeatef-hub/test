name: Deploy Bartera to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: bartera-app
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

      - name: Create deployment package
        run: |
          # Include everything needed to run: node_modules, .next, public, config
          mkdir -p deploy
          cp -r .next deploy/.next
          cp -r node_modules deploy/node_modules
          cp -r public deploy/public 2>/dev/null || true
          cp -r prisma deploy/prisma
          cp package.json deploy/
          cp server.js deploy/
          cp web.config deploy/

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: deploy
